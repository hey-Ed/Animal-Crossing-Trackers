<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AC Tracker</title>
	<link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🐛 Animal Crossing Tracker</h1>

    <div id="menu">
	<button id="toggleNames">Display Names</button> <button id="toggleSound">SFX ON</button>
        <select id="gameSelect">
		    <option value="gc">GameCube</option>
			<option value="ww">Wild World</option>
            <option value="cf">City Folk</option>
            <option value="nl">New Leaf</option>
            <option value="nh">New Horizons</option>
            
        </select>

        <select id="categorySelect">
            <option value="bugs">Bugs</option>
            <option value="fish">Fish</option>
        </select>
    </div>

    <h2 id="title">City Folk - Insectes</h2>
    <p id="counter">0 / 64</p>

    <div id="grid"></div>

    <button id="reset">Reset</button>

    <script src="script.js"></script>
</body>
</html>
